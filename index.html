<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Địa đạo Củ Chi 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/loading.css">
</head>
<body>
    <!-- UI Overlay Layer -->
    <div id="ui-container">
        <!-- Header / Title -->
        <header>
            <h1>ĐỊA ĐẠO CỦ CHI</h1>
            <p>Mô phỏng mặt cắt 3D hệ thống ngầm</p>
        </header>

        <!-- Phase Controls — Left Sidebar -->
        <nav id="phase-panel">
            <div style="font-size:10px;color:rgba(255,214,10,0.6);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding:0 2px;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:8px;">📍 Khám phá</div>
            <button class="phase-btn active" data-phase="0"><span class="badge">1</span>Tổng quan kiến trúc</button>
            <button class="phase-btn" data-phase="1"><span class="badge">2</span>Lối vào bí mật</button>
            <button class="phase-btn" data-phase="2"><span class="badge">3</span>Hệ thống hầm</button>
            <button class="phase-btn" data-phase="3"><span class="badge">4</span>Bếp Hoàng Cầm</button>
            <button class="phase-btn" data-phase="4"><span class="badge">5</span>Phòng họp & sinh hoạt</button>
            <button class="phase-btn" data-phase="5"><span class="badge">6</span>Bệnh xá ngầm</button>
            <button class="phase-btn" data-phase="6"><span class="badge">7</span>Xưởng vũ khí</button>
            <button class="phase-btn" data-phase="7"><span class="badge">8</span>Hệ thống bẫy</button>
            <button class="phase-btn" data-phase="8"><span class="badge">9</span>Thông khí</button>
            <button class="phase-btn" data-phase="9"><span class="badge">10</span>Thoát hiểm ra sông</button>
            <button class="phase-btn" data-phase="10"><span class="badge">11</span>So sánh chiến trường</button>
            <button class="phase-btn" data-phase="11"><span class="badge">12</span>Tình hình mặt đất</button>
        </nav>

        <!-- Information Panel -->
        <aside id="info-panel">
            <h2 id="info-title">Tam giác sắt</h2>
            <div id="narration-text">
                Hệ thống địa đạo Củ Chi là một kỳ tích quân sự, kéo dài hơn 250km dưới lòng đất với 3 tầng sâu khác nhau.
            </div>
            
            <div id="audio-controls">
                <button id="btn-toggle-voice" class="audio-btn" title="Bật/Tắt giọng đọc">🔊 Voice: ON</button>
                <div class="volume-slider">
                    <label for="sfx-volume">SFX</label>
                    <input type="range" id="sfx-volume" min="0" max="1" step="0.1" value="0.8">
                </div>
            </div>
            
            <div style="margin-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 15px;">
                <button id="btn-realistic-mode" class="audio-btn" style="width: 100%; border: 1px solid #ff3b30; color: #ff3b30; text-align: center;">⚫ Chế Độ Chân Thực (Tối)</button>
            </div>
        </aside>

        <!-- Camera Controls -->
        <div id="camera-controls">
            <div class="d-pad">
                <button class="cam-btn" id="cam-up">▲</button>
                <div class="d-pad-middle">
                    <button class="cam-btn" id="cam-left">◀</button>
                    <button class="cam-btn" id="cam-right">▶</button>
                </div>
                <button class="cam-btn" id="cam-down">▼</button>
            </div>
            <div class="zoom-controls">
                <button class="cam-btn" id="cam-zoom-in">+</button>
                <button class="cam-btn" id="cam-zoom-out">-</button>
            </div>
            
            <div class="time-controls" style="margin-top: 15px;">
                <button class="cam-btn" id="btn-speed-1x" style="font-size:12px; width:45px">1x</button>
                <button class="cam-btn" id="btn-speed-2x" style="font-size:12px; width:45px">2x</button>
                <button class="cam-btn" id="btn-speed-4x" style="font-size:12px; width:45px">4x</button>
            </div>
        </div>
        
        <!-- Mini-map -->
        <div id="minimap-container" style="position: absolute; bottom: 20px; left: 20px; width: 250px; height: 150px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; overflow: hidden; pointer-events: none;">
            <canvas id="minimap-canvas" width="250" height="150" style="width: 100%; height: 100%; display: block;"></canvas>
            <div style="position: absolute; top: 5px; left: 10px; font-size: 10px; color: rgba(255,255,255,0.5); font-family: 'Roboto Mono', monospace;">◉ RADAR MAP</div>
        </div>
        </div>

        <!-- Tooltip -->
        <div id="tooltip" class="hidden"></div>
    </div>

    <!-- Phase Transition Overlay -->
    <div id="phase-transition-overlay">
        <div class="phase-overlay-badge">🎖 ĐỊA ĐẠO CỦ CHI — MÔ PHỎNG</div>
        <div class="phase-overlay-line"></div>
        <div class="phase-overlay-title" id="overlay-phase-title">GIAI ĐOẠN 0</div>
        <div class="phase-overlay-subtitle" id="overlay-phase-subtitle">Toàn cảnh</div>
        <div class="phase-overlay-line"></div>
    </div>

    <!-- 3D Canvas Layer -->
    <div id="canvas-container">
        <canvas id="simulation-canvas"></canvas>
    </div>

    <!-- Core Systems (Load First) -->
    <script src="js/core/loader.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/performance.js"></script>
    <script src="js/core/pool.js"></script>
    <script src="js/core/keyboard.js"></script>
    
    <!-- Data & Config -->
    <script src="js/config/constants.js"></script>
    <script src="js/data/locations.js"></script>
    <script src="js/data/routes.js"></script>
    <script src="js/data/narrations.js"></script>
    
    <!-- Engine -->
    <script src="js/engine/canvas.js"></script>
    <script src="js/engine/projection.js"></script>
    <script src="js/engine/terrain.js"></script>
    <script src="js/engine/entities.js"></script>
    
    <!-- Audio & Visuals -->
    <script src="js/audio/audioEngine.js"></script>
    <script src="js/audio/narrator.js"></script>
    <script src="js/visual/particles.js"></script>
    <script src="js/visual/depth-effects.js"></script>
    <script src="js/visual/renderer.js"></script>
    
    <!-- Warfare Systems (NEW - v3.0) -->
    <script src="js/warfare/tanks.js"></script>
    <script src="js/warfare/aircraft.js"></script>
    <script src="js/logic/simulation.js"></script>
    
    <!-- Features -->
    <script src="js/features/roomDetail.js"></script>
    <script src="js/features/timeline.js"></script>

    <!-- Logic & Input -->
    <script src="js/controls/input.js"></script>
    <script src="js/controls/ui.js"></script>
    <!-- Phase Detail Overlay Engine -->
    <script src="js/engine/phaseDetail.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Timeline toggle button
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.createElement('button');
            toggleBtn.id = 'timeline-toggle-btn';
            toggleBtn.innerHTML = '📅 Timeline';
            toggleBtn.addEventListener('click', () => {
                if (typeof TimelineInstance !== 'undefined') {
                    TimelineInstance.toggle();
                }
            });
            document.body.appendChild(toggleBtn);
        });
    </script>
</body>
</html>
